<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smriti</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Smriti</h1>
      <p class="subtitle">Browser Memory Collector</p>
    </header>

    <div class="status" id="status">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Checking...</span>
    </div>

    <section>
      <label class="toggle-row">
        <span>Enabled</span>
        <input type="checkbox" id="enabled">
      </label>
    </section>

    <section>
      <label for="daemonUrl">Daemon URL</label>
      <input type="text" id="daemonUrl" placeholder="http://127.0.0.1:9898">
    </section>

    <section>
      <label for="minDwell">Min dwell time (seconds)</label>
      <input type="number" id="minDwell" min="1" max="300" step="1">
    </section>

    <section>
      <h2>AI Chat Extractors</h2>
      <label class="toggle-row">
        <span>ChatGPT</span>
        <input type="checkbox" id="extChatgpt">
      </label>
      <label class="toggle-row">
        <span>Gemini</span>
        <input type="checkbox" id="extGemini">
      </label>
      <label class="toggle-row">
        <span>Claude</span>
        <input type="checkbox" id="extClaude">
      </label>
    </section>

    <section>
      <label for="blocklist">Domain blocklist (one per line)</label>
      <textarea id="blocklist" rows="4" placeholder="*.bank.com&#10;mail.google.com"></textarea>
    </section>

    <footer>
      <button id="save">Save</button>
      <span id="saveStatus"></span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
