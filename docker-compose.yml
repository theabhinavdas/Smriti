services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: smriti
      POSTGRES_USER: smriti
      POSTGRES_PASSWORD: ${SMRITI_PG_PASSWORD:-smriti}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - smriti-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smriti"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  valkey:
    image: valkey/valkey:8-alpine
    command: >
      valkey-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - smriti-valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  smriti-pg-data:
  smriti-valkey-data:
